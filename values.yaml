# ============================================================
# LogNest - values.yaml
# ============================================================

# -- Global image registry for air-gap environments.
# Set to your private registry, e.g. "registry.internal:5000"
global:
  imageRegistry: ""
  imagePullSecrets: []
  # imagePullSecrets:
  #   - name: regcred

# ============================================================
# Namespace
# ============================================================
namespace:
  # Name of the namespace to deploy into.
  # Create it beforehand or use --create-namespace on helm install.
  name: lognest

# ============================================================
# Log Collector CronJob
# ============================================================
collector:
  # Enable Phase 2 (kubectl API collection) — useful for multi-node clusters.
  # On single-node clusters, Phase 1 gets everything from /var/log/pods.
  # Set to false to skip Phase 2 and speed up collection.
  enableApiPhase: false

  # Collector deployment mode:
  #   cronjob   — single pod runs on schedule (default, good for single-node)
  #   daemonset — one pod per node runs on schedule (good for multi-node clusters)
  mode: cronjob

  # Cron schedule — default every 4 hours for minimal log loss risk
  # Format: standard cron (minute hour day month weekday)
  schedule1: "0 */4 * * *"
  # Second schedule (optional) — leave empty to disable
  schedule2: ""

  # Collect logs from all namespaces (true) or specific ones
  allNamespaces: true
  # Used only when allNamespaces: false
  namespaces: []
  #   - default
  #   - production

  # How many months of logs/zips to retain before deletion
  retentionMonths: 1

  # If disk usage exceeds this % of PVC capacity, delete oldest runs
  # until usage drops below the threshold. Set to 0 to disable.
  capacityThresholdPercent: 80

  image:
    repository: alpine/k8s
    tag: "1.30.2"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # Node selector, tolerations, affinity for the collector pods
  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# ============================================================
# Storage (NFS)
# ============================================================
storage:
  # NFS server address
  nfsServer: "127.0.0.1"
  # NFS exported path
  nfsPath: "/exports/lognest"

  # StorageClass created by the cluster admin using nfs-subdir-external-provisioner.
  # Uses pathPattern annotation to control the exact NFS folder name.
  storageClassName: nfs-storage

  pvc:
    name: pvc-lognest
    size: 150Gi
    accessMode: ReadWriteMany
    # Exact subdirectory name created on the NFS server under nfsPath.
    # Results in: /exports/lognest-data-pvc
    nfsSubPath: "lognest-data-pvc"

  # Sub-directory names inside the PVC
  logsDir: "logs"
  logsZipDir: "logs_zip"

# ============================================================
# Web UI Dashboard
# ============================================================
ui:
  replicaCount: 1

  image:
    repository: eliezer1234/lognest-ui
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# ============================================================
# Ingress
# ============================================================
ingress:
  enabled: true
  # ingressClassName is auto-detected from RKE2 (nginx)
  className: "nginx"
  host: "lognest.example.com"
  # TLS secret name — leave empty to disable TLS
  tlsSecret: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"

# ============================================================
# Service Account
# ============================================================
serviceAccount:
  create: true
  name: lognest

# ============================================================
# Air-gap: private registry image overrides
# ============================================================
# When global.imageRegistry is set, all images are prefixed
# automatically. You can also override individual images here.
images:
  collector:
    repository: alpine/k8s
    tag: "1.30.2"
  ui:
    repository: eliezer1234/lognest-ui
    tag: "1.0.0"
