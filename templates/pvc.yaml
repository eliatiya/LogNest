apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvc.name }}
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    # Delete PVC on uninstall — PV reclaimPolicy:Retain keeps the NFS folder intact
    "helm.sh/hook-delete-policy": hook-failed,before-hook-creation
    # Tell the nfs-subdir provisioner: never delete or archive the NFS folder
    # when the PV is released — data stays on disk forever
    "nfs.io/storage-path": {{ .Values.storage.pvc.nfsSubPath | quote }}
    "archiveOnDelete": "false"
spec:
  accessModes:
    - {{ .Values.storage.pvc.accessMode }}
  storageClassName: {{ .Values.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.pvc.size }}
