apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvc.name }}
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
  annotations:
    # Create PVC before any other hook
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    # NEVER delete the PVC on uninstall — data must be preserved
    "helm.sh/hook-delete-policy": before-hook-creation
    # Remind operators that data lives here
    "lognest/data-note": "This PVC holds all collected logs. Do not delete manually."
spec:
  accessModes:
    - {{ .Values.storage.pvc.accessMode }}
  storageClassName: {{ .Values.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.pvc.size }}
  {{- if .Values.storage.pvc.volumeName }}
  # Bind to a specific PV by name — ensures data persists across uninstall/reinstall
  volumeName: {{ .Values.storage.pvc.volumeName }}
  {{- end }}
