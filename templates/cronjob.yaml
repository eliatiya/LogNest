{{- $root := . }}
{{- $schedules := list .Values.collector.schedule1 }}
{{- if .Values.collector.schedule2 }}
{{- $schedules = append $schedules .Values.collector.schedule2 }}
{{- end }}
{{- range $i, $schedule := $schedules }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "lognest.fullname" $root }}-collector-{{ add $i 1 }}
  namespace: {{ include "lognest.namespace" $root }}
  labels:
    {{- include "lognest.labels" $root | nindent 4 }}
    lognest/component: collector
spec:
  schedule: {{ $schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # Retry up to 3 times if pod fails to start (scheduling, mount issues)
      backoffLimit: 3
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            {{- include "lognest.selectorLabels" $root | nindent 12 }}
            lognest/component: collector
        spec:
          serviceAccountName: {{ $root.Values.serviceAccount.name }}
          restartPolicy: Never
          {{- include "lognest.imagePullSecrets" $root | nindent 10 }}
          {{- with $root.Values.collector.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $root.Values.collector.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $root.Values.collector.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: collector
              image: {{ include "lognest.image" (dict "registry" $root.Values.global.imageRegistry "repository" $root.Values.collector.image.repository "tag" $root.Values.collector.image.tag) }}
              imagePullPolicy: {{ $root.Values.collector.image.pullPolicy }}
              command:
                - python3
                - /scripts/collect.py
              env:
                - name: LOGS_DIR
                  value: /data/{{ $root.Values.storage.logsDir }}
                - name: ZIP_DIR
                  value: /data/{{ $root.Values.storage.logsZipDir }}
                - name: RETENTION_MONTHS
                  value: "{{ $root.Values.collector.retentionMonths }}"
                - name: CAPACITY_THRESHOLD
                  value: "{{ $root.Values.collector.capacityThresholdPercent }}"
                - name: COLLECTOR_THREADS
                  value: "8"
                - name: MAX_FILE_SIZE_MB
                  value: "100"
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              resources:
                {{- toYaml $root.Values.collector.resources | nindent 16 }}
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: node-logs
                  mountPath: /var/log/pods
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ $root.Values.storage.pvc.name }}
            - name: scripts
              configMap:
                name: {{ include "lognest.fullname" $root }}-collector-script
                defaultMode: 0755
            - name: node-logs
              hostPath:
                path: /var/log/pods
                type: Directory
{{- end }}
