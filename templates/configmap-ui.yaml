apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lognest.fullname" . }}-ui
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
data:
  app.py: |
{{ .Files.Get "files/app.py" | indent 4 }}
  requirements.txt: |
    flask==3.0.3
    gunicorn==22.0.0
  start.sh: |
    #!/bin/sh
    set -e
    pip install --no-index --find-links=/wheels flask gunicorn 2>/dev/null || \
    pip install flask==3.0.3 gunicorn==22.0.0
    exec gunicorn --workers 2 --bind 0.0.0.0:8080 --timeout 120 app:app
