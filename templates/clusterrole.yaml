apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lognest.fullname" . }}-collector
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
rules:
  # Read pods across all namespaces
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list"]
