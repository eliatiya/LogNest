{{- if .Values.watcher.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lognest.fullname" . }}-watcher
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
    lognest/component: watcher
data:
  watcher.py: |
{{ .Files.Get "files/watcher.py" | indent 4 }}
{{- end }}
