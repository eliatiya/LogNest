apiVersion: v1
kind: Service
metadata:
  name: {{ include "lognest.fullname" . }}-ui
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
    lognest/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "lognest.selectorLabels" . | nindent 4 }}
    lognest/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
