apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lognest.fullname" . }}-collector-script
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  collect.sh: |
    #!/bin/sh
    # LogNest collector — intentionally NO set -e
    # Every error is handled explicitly so one bad pod never kills the job.

    LOGS_DIR="${LOGS_DIR:-/data/{{ .Values.storage.logsDir }}}"
    ZIP_DIR="${ZIP_DIR:-/data/{{ .Values.storage.logsZipDir }}}"
    RETENTION_MONTHS="{{ .Values.collector.retentionMonths }}"
    CAPACITY_THRESHOLD="{{ .Values.collector.capacityThresholdPercent }}"
    TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
    RUN_DIR="${LOGS_DIR}/${TIMESTAMP}"
    ERRORS=0

    echo "[LogNest] ============================================"
    echo "[LogNest] Starting log collection at ${TIMESTAMP}"
    echo "[LogNest] LOGS_DIR=${LOGS_DIR}"
    echo "[LogNest] ZIP_DIR=${ZIP_DIR}"
    echo "[LogNest] Retention: ${RETENTION_MONTHS} month(s)"
    echo "[LogNest] Capacity threshold: ${CAPACITY_THRESHOLD}%"
    echo "[LogNest] ============================================"

    # --------------------------------------------------------
    # Wait for PVC to be bound (needed when running as post-install Job)
    # --------------------------------------------------------
    PVC_NAME="{{ .Values.storage.pvc.name }}"
    PVC_NS="{{ include "lognest.namespace" . }}"
    echo "[LogNest] Waiting for PVC ${PVC_NAME} to be Bound..."
    ATTEMPTS=0
    while true; do
      PHASE=$(kubectl get pvc "${PVC_NAME}" -n "${PVC_NS}" \
        -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
      if [ "${PHASE}" = "Bound" ]; then
        echo "[LogNest] PVC is Bound — continuing"
        break
      fi
      ATTEMPTS=$((ATTEMPTS + 1))
      if [ "${ATTEMPTS}" -ge 60 ]; then
        echo "[LogNest] ERROR: PVC not bound after 5 minutes"
        exit 1
      fi
      echo "[LogNest] PVC phase='${PHASE}' — waiting 5s (${ATTEMPTS}/60)..."
      sleep 5
    done
    if ! kubectl version --client > /dev/null 2>&1; then
      echo "[LogNest] ERROR: kubectl not found or not working"
      exit 1
    fi
    echo "[LogNest] kubectl OK: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"

    # --------------------------------------------------------
    # Create directories
    # --------------------------------------------------------
    mkdir -p "${RUN_DIR}" || { echo "[LogNest] ERROR: cannot create ${RUN_DIR}"; exit 1; }
    mkdir -p "${ZIP_DIR}"  || { echo "[LogNest] ERROR: cannot create ${ZIP_DIR}";  exit 1; }
    # --------------------------------------------------------
    # Verify kubectl is available
    # --------------------------------------------------------
    if ! kubectl version --client > /dev/null 2>&1; then
      echo "[LogNest] ERROR: kubectl not found or not working"
      exit 1
    fi
    echo "[LogNest] kubectl OK: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"

    # --------------------------------------------------------
    # Create directories
    # --------------------------------------------------------
    mkdir -p "${RUN_DIR}" || { echo "[LogNest] ERROR: cannot create ${RUN_DIR}"; exit 1; }
    mkdir -p "${ZIP_DIR}"  || { echo "[LogNest] ERROR: cannot create ${ZIP_DIR}";  exit 1; }
    echo "[LogNest] Directories ready"

    # --------------------------------------------------------
    # Collect logs
    # --------------------------------------------------------
    {{- if .Values.collector.allNamespaces }}
    NAMESPACES=$(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
    if [ -z "${NAMESPACES}" ]; then
      echo "[LogNest] ERROR: could not list namespaces — check RBAC"
      exit 1
    fi
    {{- else }}
    NAMESPACES="{{ .Values.collector.namespaces | join " " }}"
    {{- end }}

    echo "[LogNest] Namespaces: ${NAMESPACES}"
    FILE_COUNT=0

    for NS in ${NAMESPACES}; do
      PODS=$(kubectl get pods -n "${NS}" \
        --no-headers \
        -o custom-columns=":metadata.name" 2>/dev/null) || continue

      for POD in ${PODS}; do
        CONTAINERS=$(kubectl get pod "${POD}" -n "${NS}" \
          -o jsonpath='{.spec.containers[*].name}' 2>/dev/null) || continue

        for CONTAINER in ${CONTAINERS}; do
          LOG_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.log"
          echo "[LogNest] Collecting: ${NS}/${POD}/${CONTAINER}"

          # Collect current logs (all lines, with timestamps)
          kubectl logs "${POD}" \
              -n "${NS}" \
              -c "${CONTAINER}" \
              --timestamps=true \
              --tail=-1 \
              2>/dev/null > "${LOG_FILE}" || \
            echo "[LogNest] WARN: could not collect ${NS}/${POD}/${CONTAINER}" > "${LOG_FILE}"

          # Also collect previous container logs if available (catches rotated/restarted logs)
          PREV_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.previous.log"
          if kubectl logs "${POD}" \
              -n "${NS}" \
              -c "${CONTAINER}" \
              --previous \
              --timestamps=true \
              --tail=-1 \
              2>/dev/null > "${PREV_FILE}"; then
            # Only keep if non-empty
            if [ -s "${PREV_FILE}" ]; then
              echo "[LogNest] Collected previous logs for ${NS}/${POD}/${CONTAINER}"
              FILE_COUNT=$((FILE_COUNT + 1))
            else
              rm -f "${PREV_FILE}"
            fi
          else
            rm -f "${PREV_FILE}" 2>/dev/null || true
          fi

          FILE_COUNT=$((FILE_COUNT + 1))
        done
      done
    done

    echo "[LogNest] Collection done — ${FILE_COUNT} files, ${ERRORS} warnings"

    # --------------------------------------------------------
    # Compress — only if we actually wrote files
    # --------------------------------------------------------
    ACTUAL_FILES=$(find "${RUN_DIR}" -name "*.log" 2>/dev/null | wc -l)
    if [ "${ACTUAL_FILES}" -gt 0 ]; then
      ZIP_FILE="${ZIP_DIR}/lognest_${TIMESTAMP}.tar.gz"
      if tar -czf "${ZIP_FILE}" -C "${LOGS_DIR}" "${TIMESTAMP}" 2>/dev/null; then
        echo "[LogNest] Archive created: ${ZIP_FILE}"
      else
        echo "[LogNest] WARN: tar failed"
      fi
    else
      echo "[LogNest] WARN: no log files collected — skipping compression"
    fi

    # --------------------------------------------------------
    # Capacity-based cleanup (runs BEFORE time-based retention)
    # Delete oldest runs first until disk usage is below threshold
    # --------------------------------------------------------
    if [ "${CAPACITY_THRESHOLD}" -gt 0 ] 2>/dev/null; then
      DATA_DIR="/data"
      echo "[LogNest] Checking disk capacity (threshold: ${CAPACITY_THRESHOLD}%)"

      USED_PCT=$(df "${DATA_DIR}" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
      echo "[LogNest] Current disk usage: ${USED_PCT}%"

      while [ "${USED_PCT:-0}" -ge "${CAPACITY_THRESHOLD}" ]; do
        # Find the oldest run directory (skip the one we just created)
        OLDEST_RUN=$(ls -1 "${LOGS_DIR}" 2>/dev/null | grep -v "^${TIMESTAMP}$" | sort | head -1)
        OLDEST_ZIP="${ZIP_DIR}/lognest_${OLDEST_RUN}.tar.gz"

        if [ -z "${OLDEST_RUN}" ]; then
          echo "[LogNest] WARN: disk still above threshold but no old runs to delete"
          break
        fi

        echo "[LogNest] Capacity cleanup: deleting oldest run ${OLDEST_RUN} (disk at ${USED_PCT}%)"
        rm -rf "${LOGS_DIR:?}/${OLDEST_RUN}"
        [ -f "${OLDEST_ZIP}" ] && rm -f "${OLDEST_ZIP}" && \
          echo "[LogNest] Capacity cleanup: deleted archive ${OLDEST_ZIP}"

        USED_PCT=$(df "${DATA_DIR}" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
        echo "[LogNest] Disk usage after cleanup: ${USED_PCT}%"
      done
    fi

    # --------------------------------------------------------
    # Time-based retention: delete runs older than RETENTION_MONTHS
    # --------------------------------------------------------
    CUTOFF_EPOCH=$(awk -v months="${RETENTION_MONTHS}" \
      'BEGIN { print systime() - (months * 30 * 86400) }' 2>/dev/null) || true

    if [ -n "${CUTOFF_EPOCH}" ]; then
      echo "[LogNest] Retention: removing runs older than ${RETENTION_MONTHS} month(s)"

      for DIR in "${LOGS_DIR}"/*/; do
        [ -d "${DIR}" ] || continue
        DIRNAME=$(basename "${DIR}")
        DIR_EPOCH=$(echo "${DIRNAME}" | awk -F'[_-]' '{
          cmd = "date -d \""$1"-"$2"-"$3" "$4":"$5":"$6"\" +%s 2>/dev/null"
          cmd | getline ep; close(cmd); print ep+0
        }' 2>/dev/null) || DIR_EPOCH=0

        if [ "${DIR_EPOCH}" -gt 0 ] && [ "${DIR_EPOCH}" -lt "${CUTOFF_EPOCH}" ]; then
          echo "[LogNest] Retention: deleting old run ${DIRNAME}"
          rm -rf "${DIR}"
        fi
      done

      for ZIPF in "${ZIP_DIR}"/lognest_*.tar.gz; do
        [ -f "${ZIPF}" ] || continue
        ZIPNAME=$(basename "${ZIPF}" .tar.gz | sed 's/^lognest_//')
        ZIP_EPOCH=$(echo "${ZIPNAME}" | awk -F'[_-]' '{
          cmd = "date -d \""$1"-"$2"-"$3" "$4":"$5":"$6"\" +%s 2>/dev/null"
          cmd | getline ep; close(cmd); print ep+0
        }' 2>/dev/null) || ZIP_EPOCH=0

        if [ "${ZIP_EPOCH}" -gt 0 ] && [ "${ZIP_EPOCH}" -lt "${CUTOFF_EPOCH}" ]; then
          echo "[LogNest] Retention: deleting old zip ${ZIPF}"
          rm -f "${ZIPF}"
        fi
      done
    fi

    echo "[LogNest] ============================================"
    echo "[LogNest] Done. Files: ${FILE_COUNT}, Warnings: ${ERRORS}"
    FINAL_PCT=$(df "/data" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
    echo "[LogNest] Final disk usage: ${FINAL_PCT}%"
    echo "[LogNest] ============================================"
    exit 0
