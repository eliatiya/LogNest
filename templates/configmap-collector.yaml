apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lognest.fullname" . }}-collector-script
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  collect.sh: |
    #!/bin/sh
    # ============================================================
    # LogNest Collector — Incremental, with .gz rotation support
    # ============================================================
    # - Reads logs from /var/log/pods (hostPath) to get rotated .gz files
    # - Tracks last collection time per container to only collect new data
    # - First run (no state file) collects everything
    # - Always exits 0 — errors are logged, never fatal
    # ============================================================

    LOGS_DIR="${LOGS_DIR:-/data/{{ .Values.storage.logsDir }}}"
    ZIP_DIR="${ZIP_DIR:-/data/{{ .Values.storage.logsZipDir }}}"
    RETENTION_MONTHS="{{ .Values.collector.retentionMonths }}"
    CAPACITY_THRESHOLD="{{ .Values.collector.capacityThresholdPercent }}"
    NODE_LOGS="/var/log/pods"
    STATE_FILE="/data/.lognest_last_collect"
    TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
    NOW_EPOCH=$(date +%s)
    RUN_DIR="${LOGS_DIR}/${TIMESTAMP}"
    ERRORS=0
    FILE_COUNT=0

    echo "[LogNest] ============================================"
    echo "[LogNest] Starting log collection at ${TIMESTAMP}"
    echo "[LogNest] Node: ${NODE_NAME:-unknown}"
    echo "[LogNest] Mode: hostPath /var/log/pods + kubectl API"
    echo "[LogNest] ============================================"

    # --------------------------------------------------------
    # Load last collection timestamp (epoch seconds)
    # If no state file exists, this is the first run — collect all
    # --------------------------------------------------------
    LAST_EPOCH=0
    if [ -f "${STATE_FILE}" ]; then
      LAST_EPOCH=$(cat "${STATE_FILE}" 2>/dev/null || echo "0")
      echo "[LogNest] Incremental mode: collecting logs since epoch ${LAST_EPOCH}"
    else
      echo "[LogNest] First run: collecting ALL logs"
    fi

    # --------------------------------------------------------
    # Create directories
    # --------------------------------------------------------
    mkdir -p "${RUN_DIR}" || { echo "[LogNest] ERROR: cannot create ${RUN_DIR}"; exit 0; }
    mkdir -p "${ZIP_DIR}" || { echo "[LogNest] ERROR: cannot create ${ZIP_DIR}"; exit 0; }

    # --------------------------------------------------------
    # Phase 1: Collect from /var/log/pods (node filesystem)
    # This gets active logs AND rotated .gz files
    # --------------------------------------------------------
    echo "[LogNest] Phase 1: Reading from ${NODE_LOGS}"

    if [ -d "${NODE_LOGS}" ]; then
      for NS_POD_DIR in "${NODE_LOGS}"/*/; do
        [ -d "${NS_POD_DIR}" ] || continue
        # Directory name format: <namespace>_<pod-name>_<pod-uid>
        DIR_NAME=$(basename "${NS_POD_DIR}")
        NS=$(echo "${DIR_NAME}" | cut -d'_' -f1)
        POD=$(echo "${DIR_NAME}" | cut -d'_' -f2)

        for CONTAINER_DIR in "${NS_POD_DIR}"/*/; do
          [ -d "${CONTAINER_DIR}" ] || continue
          CONTAINER=$(basename "${CONTAINER_DIR}")
          OUT_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.log"

          # Collect all log files (active .log and rotated .log.gz)
          # Sort by modification time to get chronological order
          COLLECTED=0

          # First: rotated .gz files (older logs)
          for GZ_FILE in $(find "${CONTAINER_DIR}" -name "*.log.*.gz" -newer_check 2>/dev/null | sort); do
            # Check if file was modified after last collection
            FILE_EPOCH=$(stat -c %Y "${GZ_FILE}" 2>/dev/null || echo "0")
            if [ "${FILE_EPOCH}" -gt "${LAST_EPOCH}" ]; then
              gunzip -c "${GZ_FILE}" >> "${OUT_FILE}" 2>/dev/null && COLLECTED=1
            fi
          done

          # Fallback: find without -newer_check (busybox compatible)
          if [ "${COLLECTED}" -eq 0 ]; then
            for GZ_FILE in $(ls -t "${CONTAINER_DIR}"/*.log.*.gz 2>/dev/null | sort); do
              FILE_EPOCH=$(stat -c %Y "${GZ_FILE}" 2>/dev/null || echo "0")
              if [ "${FILE_EPOCH}" -gt "${LAST_EPOCH}" ]; then
                gunzip -c "${GZ_FILE}" >> "${OUT_FILE}" 2>/dev/null && COLLECTED=1
              fi
            done
          fi

          # Then: active .log files (current logs)
          for LOG_FILE in $(ls -t "${CONTAINER_DIR}"/*.log 2>/dev/null | sort); do
            FILE_EPOCH=$(stat -c %Y "${LOG_FILE}" 2>/dev/null || echo "0")
            if [ "${FILE_EPOCH}" -gt "${LAST_EPOCH}" ]; then
              # For active log files, only get lines newer than last collection
              if [ "${LAST_EPOCH}" -gt 0 ]; then
                cat "${LOG_FILE}" >> "${OUT_FILE}" 2>/dev/null && COLLECTED=1
              else
                cat "${LOG_FILE}" >> "${OUT_FILE}" 2>/dev/null && COLLECTED=1
              fi
            fi
          done

          if [ "${COLLECTED}" -eq 1 ] && [ -s "${OUT_FILE}" ]; then
            FILE_COUNT=$((FILE_COUNT + 1))
            echo "[LogNest] Collected: ${NS}/${POD}/${CONTAINER} (node logs)"
          else
            rm -f "${OUT_FILE}" 2>/dev/null
          fi
        done
      done
    else
      echo "[LogNest] WARN: ${NODE_LOGS} not mounted — skipping node-level collection"
    fi

    # --------------------------------------------------------
    # Phase 2: Collect via kubectl API (catches pods on other nodes
    # in multi-node clusters, and --previous for restarted containers)
    # --------------------------------------------------------
    echo "[LogNest] Phase 2: kubectl API collection"

    if kubectl version --client > /dev/null 2>&1; then
      {{- if .Values.collector.allNamespaces }}
      NAMESPACES=$(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
      {{- else }}
      NAMESPACES="{{ .Values.collector.namespaces | join " " }}"
      {{- end }}

      # Calculate --since-seconds for incremental
      if [ "${LAST_EPOCH}" -gt 0 ]; then
        SINCE_SECS=$((NOW_EPOCH - LAST_EPOCH + 60))
        SINCE_FLAG="--since=${SINCE_SECS}s"
      else
        SINCE_FLAG=""
      fi

      for NS in ${NAMESPACES}; do
        PODS=$(kubectl get pods -n "${NS}" --no-headers \
          -o custom-columns=":metadata.name" 2>/dev/null) || continue

        for POD in ${PODS}; do
          CONTAINERS=$(kubectl get pod "${POD}" -n "${NS}" \
            -o jsonpath='{.spec.containers[*].name}' 2>/dev/null) || continue

          for CONTAINER in ${CONTAINERS}; do
            API_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.api.log"

            # Only collect via API if we didn't already get it from node logs
            NODE_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.log"
            if [ -f "${NODE_FILE}" ] && [ -s "${NODE_FILE}" ]; then
              continue
            fi

            # Current container logs
            if kubectl logs "${POD}" -n "${NS}" -c "${CONTAINER}" \
                --timestamps=true ${SINCE_FLAG} \
                2>/dev/null > "${API_FILE}"; then
              if [ -s "${API_FILE}" ]; then
                # Rename to standard format
                mv "${API_FILE}" "${NODE_FILE}"
                FILE_COUNT=$((FILE_COUNT + 1))
                echo "[LogNest] Collected: ${NS}/${POD}/${CONTAINER} (API)"
              else
                rm -f "${API_FILE}"
              fi
            else
              rm -f "${API_FILE}" 2>/dev/null
            fi

            # Previous container logs (catches restarts)
            PREV_FILE="${RUN_DIR}/${NS}__${POD}__${CONTAINER}__${TIMESTAMP}.previous.log"
            if kubectl logs "${POD}" -n "${NS}" -c "${CONTAINER}" \
                --previous --timestamps=true ${SINCE_FLAG} \
                2>/dev/null > "${PREV_FILE}"; then
              if [ -s "${PREV_FILE}" ]; then
                FILE_COUNT=$((FILE_COUNT + 1))
                echo "[LogNest] Collected: ${NS}/${POD}/${CONTAINER} (API/previous)"
              else
                rm -f "${PREV_FILE}"
              fi
            else
              rm -f "${PREV_FILE}" 2>/dev/null
            fi
          done
        done
      done
    else
      echo "[LogNest] WARN: kubectl not available — skipping API collection"
    fi

    echo "[LogNest] Collection done — ${FILE_COUNT} files"

    # --------------------------------------------------------
    # Save current timestamp as the new "last collection" marker
    # --------------------------------------------------------
    echo "${NOW_EPOCH}" > "${STATE_FILE}"
    echo "[LogNest] State saved: next run will collect from epoch ${NOW_EPOCH}"

    # --------------------------------------------------------
    # Compress — only if we actually wrote files
    # --------------------------------------------------------
    ACTUAL_FILES=$(find "${RUN_DIR}" -name "*.log" 2>/dev/null | wc -l)
    if [ "${ACTUAL_FILES}" -gt 0 ]; then
      ZIP_FILE="${ZIP_DIR}/lognest_${TIMESTAMP}.tar.gz"
      if tar -czf "${ZIP_FILE}" -C "${LOGS_DIR}" "${TIMESTAMP}" 2>/dev/null; then
        echo "[LogNest] Archive created: ${ZIP_FILE}"
      else
        echo "[LogNest] WARN: tar compression failed"
      fi
    else
      echo "[LogNest] No new logs collected — skipping compression"
      rmdir "${RUN_DIR}" 2>/dev/null || true
    fi

    # --------------------------------------------------------
    # Capacity-based cleanup
    # --------------------------------------------------------
    if [ "${CAPACITY_THRESHOLD}" -gt 0 ] 2>/dev/null; then
      USED_PCT=$(df "/data" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
      while [ "${USED_PCT:-0}" -ge "${CAPACITY_THRESHOLD}" ]; do
        OLDEST_RUN=$(ls -1 "${LOGS_DIR}" 2>/dev/null | grep -v "^${TIMESTAMP}$" | grep -v "^\." | sort | head -1)
        if [ -z "${OLDEST_RUN}" ]; then break; fi
        echo "[LogNest] Capacity cleanup: deleting ${OLDEST_RUN} (disk at ${USED_PCT}%)"
        rm -rf "${LOGS_DIR:?}/${OLDEST_RUN}"
        rm -f "${ZIP_DIR}/lognest_${OLDEST_RUN}.tar.gz" 2>/dev/null
        USED_PCT=$(df "/data" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
      done
    fi

    # --------------------------------------------------------
    # Time-based retention
    # --------------------------------------------------------
    CUTOFF_EPOCH=$(awk -v months="${RETENTION_MONTHS}" \
      'BEGIN { print systime() - (months * 30 * 86400) }' 2>/dev/null) || true

    if [ -n "${CUTOFF_EPOCH}" ] && [ "${CUTOFF_EPOCH}" -gt 0 ]; then
      for DIR in "${LOGS_DIR}"/*/; do
        [ -d "${DIR}" ] || continue
        DIRNAME=$(basename "${DIR}")
        DIR_MTIME=$(stat -c %Y "${DIR}" 2>/dev/null || echo "0")
        if [ "${DIR_MTIME}" -gt 0 ] && [ "${DIR_MTIME}" -lt "${CUTOFF_EPOCH}" ]; then
          echo "[LogNest] Retention: deleting ${DIRNAME}"
          rm -rf "${DIR}"
          rm -f "${ZIP_DIR}/lognest_${DIRNAME}.tar.gz" 2>/dev/null
        fi
      done
    fi

    # --------------------------------------------------------
    # Done
    # --------------------------------------------------------
    FINAL_PCT=$(df "/data" 2>/dev/null | awk 'NR==2{gsub(/%/,"",$5); print $5}')
    echo "[LogNest] ============================================"
    echo "[LogNest] Done. Files: ${FILE_COUNT}, Disk: ${FINAL_PCT}%"
    echo "[LogNest] ============================================"
    exit 0
