apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lognest.fullname" . }}-init-collect
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
    lognest/component: collector
  annotations:
    # Run once immediately after helm install completes
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    # Clean up the job pod after it finishes successfully
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        {{- include "lognest.selectorLabels" . | nindent 8 }}
        lognest/component: collector
        lognest/job-type: init
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      {{- include "lognest.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.collector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.collector.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.collector.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Wait until the PVC is bound before the collector tries to mount it
        - name: wait-for-pvc
          image: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.collector.image.repository "tag" .Values.collector.image.tag) }}
          command:
            - /bin/sh
            - -c
            - |
              echo "[LogNest] Waiting for PVC {{ .Values.storage.pvc.name }} to be bound..."
              ATTEMPTS=0
              MAX_ATTEMPTS=60
              until [ "${ATTEMPTS}" -ge "${MAX_ATTEMPTS}" ]; do
                PHASE=$(kubectl get pvc {{ .Values.storage.pvc.name }} \
                  -n {{ include "lognest.namespace" . }} \
                  -o jsonpath='{.status.phase}' 2>&1)
                echo "[LogNest] PVC phase='${PHASE}' (attempt ${ATTEMPTS}/${MAX_ATTEMPTS})"
                if echo "${PHASE}" | grep -q "Bound"; then
                  echo "[LogNest] PVC is Bound — proceeding"
                  exit 0
                fi
                ATTEMPTS=$((ATTEMPTS + 1))
                sleep 5
              done
              echo "[LogNest] ERROR: PVC not bound after $((MAX_ATTEMPTS * 5))s — last status:"
              kubectl describe pvc {{ .Values.storage.pvc.name }} -n {{ include "lognest.namespace" . }} 2>&1 || true
              exit 1
      containers:
        - name: init-collector
          image: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.collector.image.repository "tag" .Values.collector.image.tag) }}
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          command:
            - /bin/sh
            - /scripts/collect.sh
          env:
            - name: LOGS_DIR
              value: /data/{{ .Values.storage.logsDir }}
            - name: ZIP_DIR
              value: /data/{{ .Values.storage.logsZipDir }}
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
        - name: scripts
          configMap:
            name: {{ include "lognest.fullname" . }}-collector-script
            defaultMode: 0755
