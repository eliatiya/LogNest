apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lognest.fullname" . }}-ui
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
    lognest/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "lognest.selectorLabels" . | nindent 6 }}
      lognest/component: ui
  template:
    metadata:
      labels:
        {{- include "lognest.selectorLabels" . | nindent 8 }}
        lognest/component: ui
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- include "lognest.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag) }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /configmap/app.py /app/app.py
              cd /app && exec gunicorn --workers 2 --bind 0.0.0.0:8080 --timeout 120 --access-logfile /dev/null --error-logfile - --log-level warning app:app
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LOGS_DIR
              value: /data/{{ .Values.storage.logsDir }}
            - name: ZIP_DIR
              value: /data/{{ .Values.storage.logsZipDir }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COLLECTOR_IMAGE
              value: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.collector.image.repository "tag" .Values.collector.image.tag) }}
            - name: COLLECTOR_SA
              value: {{ .Values.serviceAccount.name }}
            - name: COLLECTOR_CM
              value: {{ include "lognest.fullname" . }}-collector-script
            - name: PVC_NAME
              value: {{ .Values.storage.pvc.name }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: configmap
              mountPath: /configmap
              readOnly: true
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
      volumes:
        - name: configmap
          configMap:
            name: {{ include "lognest.fullname" . }}-ui
        - name: app
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
