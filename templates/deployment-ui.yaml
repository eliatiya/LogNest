apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lognest.fullname" . }}-ui
  namespace: {{ include "lognest.namespace" . }}
  labels:
    {{- include "lognest.labels" . | nindent 4 }}
    lognest/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "lognest.selectorLabels" . | nindent 6 }}
      lognest/component: ui
  template:
    metadata:
      labels:
        {{- include "lognest.selectorLabels" . | nindent 8 }}
        lognest/component: ui
    spec:
      {{- include "lognest.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-app
          image: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag) }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /configmap/app.py /app/app.py
              cp /configmap/requirements.txt /app/requirements.txt
              cp /configmap/start.sh /app/start.sh
              chmod +x /app/start.sh
              pip install --quiet flask==3.0.3 gunicorn==22.0.0
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: app
              mountPath: /app
      containers:
        - name: ui
          image: {{ include "lognest.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag) }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cd /app && exec gunicorn --workers 2 --bind 0.0.0.0:8080 --timeout 120 app:app
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LOGS_DIR
              value: /data/{{ .Values.storage.logsDir }}
            - name: ZIP_DIR
              value: /data/{{ .Values.storage.logsZipDir }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: app
              mountPath: /app
      volumes:
        - name: configmap
          configMap:
            name: {{ include "lognest.fullname" . }}-ui
        - name: app
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
